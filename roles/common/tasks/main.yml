---
- name: Assert supported distro family
  ansible.builtin.assert:
    that:
      - ansible_os_family in ["Debian", "Archlinux"]
    fail_msg: "Supported families: Debian/Ubuntu and Arch Linux."

- name: Set distro-specific values
  ansible.builtin.set_fact:
    _sudo_group: "{{ 'sudo' if ansible_os_family == 'Debian' else 'wheel' }}"
    _ssh_service_name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"

- name: Update and upgrade (Debian)
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Update and upgrade (Arch)
  community.general.pacman:
    update_cache: true
    upgrade: true
  when: ansible_os_family == "Archlinux"

- name: Ensure base platform packages are present (Debian)
  ansible.builtin.apt:
    name:
      - ufw
      - openssh-server
      - sudo
      - ca-certificates
      - fail2ban
      - unattended-upgrades
    state: present
  when: ansible_os_family == "Debian"

- name: Ensure base platform packages are present (Arch)
  community.general.pacman:
    name:
      - ufw
      - openssh
      - sudo
      - ca-certificates
      - fail2ban
    state: present
  when: ansible_os_family == "Archlinux"

- name: Install common packages
  ansible.builtin.package:
    name: "{{ common_packages }}"
    state: present

- name: Remove distro Node.js/npm packages to avoid conflicts with nvm
  ansible.builtin.package:
    name:
      - nodejs
      - npm
    state: absent

- name: Ensure bootstrap user exists
  ansible.builtin.user:
    name: "{{ bootstrap_user }}"
    shell: "{{ bootstrap_user_shell }}"
    groups: "{{ _sudo_group }}"
    append: true
    create_home: true
    state: present

- name: Set authorized key for bootstrap user from provided key string
  ansible.posix.authorized_key:
    user: "{{ bootstrap_user }}"
    key: "{{ bootstrap_user_ssh_public_key }}"
    state: present
  when:
    - bootstrap_user_ssh_public_key is defined
    - bootstrap_user_ssh_public_key | length > 0

- name: Set authorized key for bootstrap user from control machine pubkey file
  ansible.posix.authorized_key:
    user: "{{ bootstrap_user }}"
    key: "{{ lookup('ansible.builtin.file', bootstrap_user_ssh_public_key_path | regex_replace('^~', lookup('ansible.builtin.env', 'HOME'))) }}"
    state: present
  when:
    - bootstrap_user_ssh_public_key is not defined or bootstrap_user_ssh_public_key | length == 0

- name: Configure passwordless sudo for bootstrap user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/90-{{ bootstrap_user }}"
    owner: root
    group: root
    mode: "0440"
    content: "{{ bootstrap_user }} ALL=(ALL) NOPASSWD:ALL\n"
    validate: "visudo -cf %s"
  when: bootstrap_user_passwordless_sudo | bool

- name: Set system timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Configure PasswordAuthentication in sshd_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication\\s+'
    line: "PasswordAuthentication {{ 'no' if ssh_disable_password_auth else 'yes' }}"
    create: false
  notify: Restart ssh

- name: Configure PermitRootLogin in sshd_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin\\s+'
    line: "PermitRootLogin {{ 'yes' if ssh_permit_root_login else 'no' }}"
    create: false
  notify: Restart ssh

- name: Ensure SSH service is enabled and started
  ansible.builtin.service:
    name: "{{ _ssh_service_name }}"
    enabled: true
    state: started

- name: Ensure fail2ban is enabled and started
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started
  when: enable_fail2ban | bool

- name: Configure unattended upgrades (Debian)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";
      APT::Periodic::Unattended-Upgrade "1";
  when:
    - enable_auto_updates | bool
    - ansible_os_family == "Debian"

- name: Note auto-update status on Arch
  ansible.builtin.debug:
    msg: "Auto updates are not configured on Arch in this playbook; upgrades happen when you run it."
  when:
    - enable_auto_updates | bool
    - ansible_os_family == "Archlinux"

- name: Allow configured UFW TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ ufw_allowed_tcp_ports }}"

- name: Enable UFW with default deny incoming
  community.general.ufw:
    state: enabled
    direction: incoming
    policy: deny

- name: Install nvm for bootstrap user
  ansible.builtin.shell: |
    set -euo pipefail
    curl -o- "https://raw.githubusercontent.com/nvm-sh/nvm/v{{ nvm_version }}/install.sh" | bash
  args:
    executable: /bin/bash
    creates: "/home/{{ node_setup_user }}/.nvm/nvm.sh"
  become: true
  become_user: "{{ node_setup_user }}"

- name: Ensure nvm is loaded from .bashrc
  ansible.builtin.blockinfile:
    path: "/home/{{ node_setup_user }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED NVM"
    block: |
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
    owner: "{{ node_setup_user }}"
    group: "{{ node_setup_user }}"
    mode: "0644"
    create: true

- name: Install Node.js major version via nvm
  ansible.builtin.shell: |
    set -euo pipefail
    export NVM_DIR="$HOME/.nvm"
    . "$NVM_DIR/nvm.sh"
    nvm install "{{ node_major }}"
    nvm alias default "{{ node_major }}"
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ node_setup_user }}"
  register: nvm_install_result
  changed_when: "'is already installed' not in nvm_install_result.stdout"

- name: Enable corepack for nvm-managed Node
  ansible.builtin.shell: |
    set -euo pipefail
    export NVM_DIR="$HOME/.nvm"
    . "$NVM_DIR/nvm.sh"
    nvm use "{{ node_major }}" >/dev/null
    corepack enable
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ node_setup_user }}"

- name: Activate latest pnpm via corepack
  ansible.builtin.shell: |
    set -euo pipefail
    export NVM_DIR="$HOME/.nvm"
    . "$NVM_DIR/nvm.sh"
    nvm use "{{ node_major }}" >/dev/null
    corepack prepare pnpm@latest --activate
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ node_setup_user }}"
