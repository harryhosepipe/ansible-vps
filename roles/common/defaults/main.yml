---
timezone: UTC
bootstrap_user: pablo
bootstrap_user_shell: /bin/bash
bootstrap_user_passwordless_sudo: true
bootstrap_user_ssh_public_key: ""
bootstrap_user_ssh_public_key_path: "~/.ssh/hostinger_ed25519.pub"
ssh_disable_password_auth: true
ssh_permit_root_login: true
ufw_allowed_tcp_ports:
  - 22
  - 80
  - 443
enable_fail2ban: true
enable_auto_updates: true
common_packages:
  - curl
  - git
  - neovim
  - htop
  - tmux
  - ripgrep
  - rsync
  - unzip
nvm_version: "0.40.4"
node_major: "24"
node_setup_user: "{{ bootstrap_user }}"
